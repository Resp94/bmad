<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Squad Dashboard - GBA Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gba-blue: #2255BB;
            --gba-light-blue: #4488FF;
            --gba-text-bg: #F8F8F8;
            --color-working: #00E676;
            --color-waiting: #FFD600;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Press Start 2P', cursive; background-color: #1a1a2e;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; image-rendering: pixelated;
        }

        #wrapper { display: flex; gap: 12px; align-items: stretch; }

        /* ── GAME SCENE ── */
        #game-container {
            width: 800px; height: 600px; 
            background-color: #000;
            position: relative; border: 8px solid #000;
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.15); overflow: hidden; flex-shrink: 0;
        }

        #scene {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
            transform-origin: 50% 50%;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #office-floor {
            width: 100%; height: 100%;
            background-image: url('assets/Escritorio.png');
            background-size: 100% 100%; background-position: center; background-repeat: no-repeat;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* ── DAY/NIGHT CYCLE (CSS FILTERS) ── */
        #scene.is-night #office-floor {
            background-image: url('assets/Escritorio_noite.png');
            filter: none; /* A imagem gerada já é noturna */
        }
        
        /* O objeto da luminária (ponto de luz) na mesa */
        #scene.is-night .workspace::before {
            content: '';
            position: absolute;
            width: 6px; height: 3px;
            background-color: #FFFDE7;
            border-radius: 3px 3px 0 0;
            top: 30%; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 6px 3px rgba(255, 214, 0, 0.9);
            z-index: 6; /* Acima da mesa */
        }

        /* O cone de luz iluminando a área */
        #scene.is-night .workspace::after {
            content: '';
            position: absolute;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(255, 214, 0, 0.15) 0%, rgba(255, 214, 0, 0) 60%);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        /* Personagens com cores normais, iluminados pela luminária */
        #scene.is-night .pa-desk:not(.state-working):not(.state-waiting),
        #scene.is-night .agent:not(.state-working):not(.state-waiting) {
            filter: brightness(0.95) sepia(0.2) saturate(1.2);
        }

        /* Luzes intensas durante a noite para os ativos */
        #scene.is-night .pa-desk.state-working {
            filter: drop-shadow(0 0 10px #00E676) drop-shadow(0 0 20px #00E676) brightness(1.2);
        }
        #scene.is-night .agent.state-working {
            filter: drop-shadow(0 0 5px #00E676) drop-shadow(0 0 15px #00E676) brightness(1.2);
        }

        #scene.is-night .pa-desk.state-waiting {
            filter: drop-shadow(0 0 10px #FFD600) drop-shadow(0 0 20px #FFD600) brightness(1.2);
        }
        #scene.is-night .agent.state-waiting {
            filter: drop-shadow(0 0 5px #FFD600) drop-shadow(0 0 15px #FFD600) brightness(1.2);
        }

        /* ── WORKSPACES (Baias fixas) ── */
        #workspaces-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
        }

        .workspace {
            position: absolute;
            width: 100px; height: 100px;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pa-desk {
            position: absolute; width: 80px; height: 80px;
            background-size: contain; background-repeat: no-repeat;
            background-position: center center;
            z-index: 5;
            transition: filter 0.3s;
        }
        .pa-desk.state-working { filter: drop-shadow(0 0 4px #00E676) drop-shadow(0 0 8px #00E676); }
        .pa-desk.state-waiting { filter: drop-shadow(0 0 4px #FFD600) drop-shadow(0 0 8px #FFD600); }

        .agent {
            position: absolute; width: 64px; height: 64px;
            image-rendering: pixelated; background-color: transparent;
            background-repeat: no-repeat; background-size: 200% 100%;
            background-position: 0% 0;
            bottom: 45px; /* Altura ideal para aparecer atrás da mesa centralizada */
            z-index: 4;
        }

        /* Winston sprite é maior que os outros, precisa de scale */
        .agent.winston {
            transform: scale(0.6) translateY(-20px);
            transform-origin: bottom center;
        }

        /* STATUS GLOW EFFECTS */
        .agent.state-working {
            filter: drop-shadow(0 0 2px #00E676) drop-shadow(0 0 5px #00E676);
        }
        .agent.state-waiting {
            filter: drop-shadow(0 0 2px #FFD600) drop-shadow(0 0 5px #FFD600);
        }

        /* Estado Trabalhando (Animação de Digitação) */
        .agent.working {
            animation: sit-cycle 0.8s infinite step-end;
        }

        @keyframes sit-cycle {
            0% { background-position-x: 0%; }
            50% { background-position-x: 100%; }
            100% { background-position-x: 0%; }
        }

        /* UI DOS AGENTES */
        .agent-ui-layer {
            position: absolute; width: 100%; height: 100%;
            top: -15px; left: 0; z-index: 20; pointer-events: none;
        }

        .agent-label {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85); color: #FFF; 
            padding: 4px 8px; font-size: 5px; border-radius: 3px;
            white-space: nowrap; border: 1px solid #00E676;
        }

        .status-bubble {
            position: absolute; top: 5px; right: 5px; font-size: 12px;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
            animation: float-icon 2s ease-in-out infinite;
        }

        /* ── DIALOG BOX ── */
        #dialog-box {
            position: absolute; bottom: 15px; left: 15px; right: 15px;
            height: 90px; background-color: var(--gba-text-bg);
            border: 4px solid #000; border-radius: 8px; padding: 15px;
            box-sizing: border-box; z-index: 100;
            box-shadow: inset 0 0 0 4px var(--gba-blue), inset 0 0 0 6px var(--gba-light-blue);
            overflow-y: auto;
        }
        #dialog-text {
            font-size: 10px; line-height: 1.5; color: #333; margin: 0;
            white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;
        }

        /* ── CHAT PANEL ── */
        #chat-panel {
            width: 280px; height: 600px; background-color: #0d0d1a;
            border: 4px solid #00E676; border-radius: 8px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        #chat-header { background-color: #00E676; color: #000; font-size: 8px; padding: 10px; text-align: center; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { font-size: 7px; color: #ddd; background: #1a1a2e; padding: 8px; border-left: 3px solid #333; }
        .chat-msg.working { border-left-color: #00E676; }
        .chat-msg-name { color: #00E676; margin-bottom: 4px; display: block; }

        @keyframes float-icon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* ── SFX MUTE BUTTON ── */
        #sfx-toggle {
            position: absolute; bottom: 110px; right: 10px;
            z-index: 200;
            background: rgba(0,0,0,0.75); border: 2px solid #555;
            color: #888; font-family: 'Press Start 2P', cursive; font-size: 14px;
            padding: 6px 8px; cursor: pointer; border-radius: 4px;
            transition: border-color 0.2s, color 0.2s;
            line-height: 1;
        }
        #sfx-toggle:hover { border-color: #00E676; color: #FFF; }
        #sfx-toggle.active { border-color: #00E676; color: #00E676; }

        /* ── POKEDEX MODAL ── */
        .agent-clickable { cursor: pointer; }
        .agent-clickable:hover { filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8)); }
        
        @keyframes hit-flash {
            0% { filter: brightness(1); }
            50% { filter: brightness(2) contrast(0) grayscale(1) invert(1); }
            100% { filter: brightness(1); }
        }
        .hit-flash { animation: hit-flash 0.15s ease-out; }

        #pokedex-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        #pokedex-overlay.active { opacity: 1; pointer-events: auto; }
        
        #pokedex-card {
            width: 400px; background-color: #f8f8f0;
            border: 4px solid #333; border-radius: 8px;
            box-shadow: 4px 4px 0 #111, inset -4px -4px 0 rgba(0,0,0,0.1);
            padding: 16px; position: relative;
            transform: scale(0.9); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #pokedex-overlay.active #pokedex-card { transform: scale(1); }
        
        .pk-close {
            position: absolute; top: -12px; right: -12px;
            background: #e63946; color: white; border: 3px solid #333;
            width: 32px; height: 32px; border-radius: 50%;
            font-size: 14px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 2px 2px 0 #111;
        }
        .pk-close:hover { background: #ff4d5a; }
        .pk-close:active { transform: translate(2px, 2px); box-shadow: 0 0 0 #111; }
        
        .pk-header { display: flex; justify-content: space-between; border-bottom: 2px dashed #ccc; padding-bottom: 8px; margin-bottom: 12px; }
        .pk-name { color: #333; font-size: 16px; margin: 0; }
        .pk-role { color: #666; font-size: 10px; padding-top: 4px; }
        
        .pk-body { display: flex; gap: 16px; }
        .pk-sprite-box {
            width: 96px; height: 96px; background: #e0e0d8; border: 2px solid #ccc;
            border-radius: 4px; display: flex; justify-content: center; align-items: center;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.1);
        }
        .pk-sprite-box div { width: 64px; height: 64px; background-size: 200% 100%; image-rendering: pixelated; }
        
        .pk-stats { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
        .pk-stat-row { font-size: 8px; color: #444; display: flex; justify-content: space-between; align-items: center; }
        .pk-stat-bar { color: #00E676; letter-spacing: -1px; text-shadow: 1px 1px 0 #000; }
        
        .pk-bio {
            margin-top: 16px; padding: 12px; background: #333; color: #00E676;
            border-radius: 4px; border: 2px solid #111; min-height: 60px;
            font-size: 9px; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="game-container">
            <div id="scene">
                <div id="office-floor"></div>
                <div id="workspaces-layer"></div>
            </div>
            <div id="dialog-box">
                <p id="dialog-text">Infinity Squad pronto para trabalhar, dê seu comando</p>
            </div>
            <button id="sfx-toggle" title="Ativar/Desativar Sons">🔇</button>
            
            <!-- POKEDEX OVERLAY -->
            <div id="pokedex-overlay">
                <div id="pokedex-card">
                    <div class="pk-close" onclick="closePokedex()">X</div>
                    <div class="pk-header">
                        <h2 class="pk-name" id="pk-name-text">Nome</h2>
                        <div class="pk-role" id="pk-role-text">Role</div>
                    </div>
                    <div class="pk-body">
                        <div class="pk-sprite-box"><div id="pk-sprite-img"></div></div>
                        <div class="pk-stats" id="pk-stats-container"></div>
                    </div>
                    <div class="pk-bio" id="pk-bio-text"></div>
                </div>
            </div>
        </div>
        <div id="chat-panel">
            <div id="chat-header">▶ INFINITY COMMS</div>
            <div id="chat-messages"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({
            reconnection: true,
            reconnectionAttempts: Infinity,
            reconnectionDelay: 1000
        });

        // ── SFX ENGINE (Web Audio API - 8-bit procedural sounds) ──
        const sfx = (() => {
            let ctx = null;
            let muted = localStorage.getItem('sfx-muted') !== 'false'; // default muted

            function getCtx() {
                if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                return ctx;
            }

            function playTone(freq, duration, type = 'square', gain = 0.08, startTime = 0) {
                if (muted) return;
                const c = getCtx();
                const osc = c.createOscillator();
                const g = c.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, c.currentTime + startTime);
                g.gain.setValueAtTime(gain, c.currentTime + startTime);
                g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + startTime + duration);
                osc.connect(g);
                g.connect(c.destination);
                osc.start(c.currentTime + startTime);
                osc.stop(c.currentTime + startTime + duration);
            }

            return {
                get muted() { return muted; },

                toggle() {
                    muted = !muted;
                    localStorage.setItem('sfx-muted', muted);
                    const btn = document.getElementById('sfx-toggle');
                    btn.textContent = muted ? '🔇' : '🔊';
                    btn.classList.toggle('active', !muted);
                    if (!muted) this.statusChange('working'); // feedback sonoro ao ligar
                },

                init() {
                    const btn = document.getElementById('sfx-toggle');
                    btn.textContent = muted ? '🔇' : '🔊';
                    btn.classList.toggle('active', !muted);
                    btn.addEventListener('click', () => this.toggle());
                },

                // Blip curto para cada caractere do typewriter
                typeBlip() {
                    playTone(440 + Math.random() * 60, 0.03, 'square', 0.04);
                },

                // Burst curto de teclado mecanico (apenas ao iniciar working)
                keyboardBurst() {
                    if (muted) return;
                    const keys = 8 + Math.floor(Math.random() * 6); // 8-13 teclas
                    let t = 0;
                    for (let i = 0; i < keys; i++) {
                        const freq = 300 + Math.random() * 300;
                        const gap = 0.05 + Math.random() * 0.1;
                        playTone(freq, 0.025, 'square', 0.05, t);
                        t += gap;
                    }
                },

                // Arpejos/acordes para mudanca de status
                statusChange(status) {
                    if (status === 'working') {
                        // Arpejo ascendente C5-E5-G5
                        playTone(523, 0.08, 'square', 0.07, 0);
                        playTone(659, 0.08, 'square', 0.07, 0.09);
                        playTone(784, 0.12, 'square', 0.07, 0.18);
                    } else if (status === 'waiting') {
                        // 2 tons descendentes
                        playTone(392, 0.12, 'triangle', 0.06, 0);
                        playTone(262, 0.15, 'triangle', 0.06, 0.13);
                    } else {
                        // Acorde suave de conclusao
                        playTone(262, 0.25, 'sine', 0.05, 0);
                        playTone(330, 0.25, 'sine', 0.04, 0);
                        playTone(392, 0.25, 'sine', 0.03, 0);
                    }
                }
            };
        })();
        
        // ... (agentsData mapping remains same) ...
        const agentsData = [
            { id: 'boos', name: "BOOS", role: "Leader", image: 'Boos (1).png', x: 50, y: 25, desk: 'PA - Boos (1).png', bio: "A lenda urbana. Dizem que ele aprova PRs apenas com o poder do pensamento.", stats: { "Liderança": 99, "Visão": 95, "Paciência": 40 } },
            { id: 'mary', name: "Mary", role: "Analyst", image: 'mary (1).png', x: 10, y: 33, desk: 'PA (1).png', bio: "Lê matrizes de risco no café da manhã. Se os dados não batem, ela faz baterem.", stats: { "Foco": 90, "Planilhas": 99, "Sono": 30 } },
            { id: 'amelia', name: "Amelia", role: "Dev", image: 'Amelia (1).png', x: 30, y: 33, desk: 'PA (1).png', bio: "Transforma cafeína em código. Ouve Lofi 24/7 e detesta reuniões que poderiam ser um email.", stats: { "Código": 95, "Fones": 100, "Social": 15 } },
            { id: 'john', name: "John", role: "PM", image: 'John (1).png', x: 70, y: 33, desk: 'PA (1).png', bio: "Mestre do cronograma. Consegue encaixar 'só mais uma task' em qualquer sprint.", stats: { "Organização": 90, "Cobrança": 95, "Empatia": 50 } },
            { id: 'paige', name: "Paige", role: "Writer", image: 'Paige (1).png', x: 90, y: 36, desk: 'PA (1).png', bio: "A dona das palavras. Corrige os erros de português do squad até nos comentários do código.", stats: { "Vocabulário": 99, "Documentos": 95, "Tolerância": 0 } },
            { id: 'winston', name: "Winston", role: "Architect", image: 'Winston (1).png', x: 10, y: 68, desk: 'PA (1).png', bio: "Desenha sistemas tão complexos que só ele e Deus entendem. Às vezes, só Deus.", stats: { "Escalabilidade": 98, "Diagramas": 95, "Simples": 10 } },
            { id: 'quinn', name: "Quinn", role: "QA", image: 'Quin (1).png', x: 30, y: 68, desk: 'PA (1).png', bio: "O pesadelo dos Devs. Encontra bugs onde não existe nem código ainda.", stats: { "Detalhe": 99, "Quebrar Tudo": 95, "Amigos Devs": 20 } },
            { id: 'bob', name: "Bob", role: "SM", image: 'Bob (1).png', x: 50, y: 68, desk: 'PA (1).png', bio: "Pregador da religião Ágil. Se você não fez a Daily, o Bob sabe. Ele sempre sabe.", stats: { "Scrum": 99, "Post-its": 100, "Impedimentos": 0 } },
            { id: 'barry', name: "Barry", role: "Quick Dev", image: 'Barry (1).png', x: 70, y: 68, desk: 'PA (1).png', bio: "Programa mais rápido que a própria sombra. A gambiarra é temporária (até ir pra produção).", stats: { "Velocidade": 99, "Gambiarra": 85, "Testes": 5 } },
            { id: 'sally', name: "Sally", role: "Designer", image: 'Sally (1).png', x: 90, y: 68, desk: 'PA (1).png', bio: "Se a cor estiver 1 tom de hex fora do padrão, ela vai notar e chorar sangue.", stats: { "Estética": 99, "Figma": 95, "Paciência PMs": 10 } }
        ];

        const workspacesLayer = document.getElementById('workspaces-layer');
        const dialogText = document.getElementById('dialog-text');
        const agentElements = {};

        // --- TYPEWRITER & CHAT (Animação de digitação) ---
        let isTyping = false;
        let typeQueue = [];

        function typeWriter(text) {
            if (isTyping) { typeQueue.push(text); return; }
            isTyping = true; dialogText.textContent = ''; let i = 0;
            function nextChar() {
                if (i < text.length) { dialogText.textContent += text[i++]; sfx.typeBlip(); setTimeout(nextChar, 25); }
                else { isTyping = false; if (typeQueue.length > 0) setTimeout(() => typeWriter(typeQueue.shift()), 800); }
            }
            nextChar();
        }

        // --- POKEDEX MODAL ---
        let pkTypeInterval = null;
        function renderStatBar(val) {
            const totalBlocks = 10;
            const filledBlocks = Math.round((val / 100) * totalBlocks);
            return '█'.repeat(filledBlocks) + '░'.repeat(totalBlocks - filledBlocks);
        }
        
        function closePokedex() {
            document.getElementById('pokedex-overlay').classList.remove('active');
            clearInterval(pkTypeInterval);
            sfx.statusChange('waiting'); // feedback sonoro de fechar
        }

        function showPokedex(id) {
            const agent = agentsData.find(a => a.id === id);
            if (!agent) return;
            
            document.getElementById('pk-name-text').textContent = agent.name;
            document.getElementById('pk-role-text').textContent = agent.role;
            document.getElementById('pk-sprite-img').style.backgroundImage = `url('assets/${agent.image}')`;
            
            const statsHtml = Object.entries(agent.stats).map(([key, val]) => `
                <div class="pk-stat-row">
                    <span>${key}</span>
                    <span class="pk-stat-bar">${renderStatBar(val)}</span>
                </div>
            `).join('');
            document.getElementById('pk-stats-container').innerHTML = statsHtml;
            
            const bioContainer = document.getElementById('pk-bio-text');
            bioContainer.textContent = '';
            clearInterval(pkTypeInterval);
            let i = 0;
            
            document.getElementById('pokedex-overlay').classList.add('active');
            
            // Inicia o typewriter depois da animação do modal
            setTimeout(() => {
                pkTypeInterval = setInterval(() => {
                    if (i < agent.bio.length) {
                        bioContainer.textContent += agent.bio[i];
                        sfx.typeBlip();
                        i++;
                    } else {
                        clearInterval(pkTypeInterval);
                    }
                }, 35);
            }, 200);
        }

        // Fechar ao clicar fora do card
        document.getElementById('pokedex-overlay').addEventListener('click', (e) => {
            if(e.target.id === 'pokedex-overlay') closePokedex();
        });

        function initScene() {
            agentsData.forEach(a => {
                const workspace = document.createElement('div');
                workspace.className = 'workspace';
                workspace.style.left = a.x + '%';
                workspace.style.top = a.y + '%';

                const desk = document.createElement('div');
                desk.className = 'pa-desk';
                desk.style.backgroundImage = `url('assets/${a.desk}')`;

                const agentEl = document.createElement('div');
                agentEl.className = `agent ${a.id} agent-clickable`;
                agentEl.style.backgroundImage = `url('assets/${a.image}')`;
                
                agentEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    agentEl.classList.add('hit-flash');
                    sfx.typeBlip();
                    setTimeout(() => agentEl.classList.remove('hit-flash'), 150);
                    showPokedex(a.id);
                });
                
                const uiLayer = document.createElement('div');
                uiLayer.className = 'agent-ui-layer';
                uiLayer.innerHTML = `
                    <div class="agent-label">${a.name}</div>
                    <div class="status-bubble" id="bubble-${a.id}">💤</div>
                `;
                
                workspace.appendChild(agentEl);
                workspace.appendChild(desk);
                workspace.appendChild(uiLayer);
                workspacesLayer.appendChild(workspace);
                
                agentElements[a.id] = { agentEl, status: 'idle' };
            });
        }

        function updateZoom() {
            const scene = document.getElementById('scene');
            const activeEntry = Object.entries(agentElements).find(([id, a]) => a.status === 'working' || a.status === 'waiting');
            if (activeEntry) {
                const [id, a] = activeEntry;
                const agentData = agentsData.find(ad => ad.id === id);
                if (agentData) {
                    scene.style.transformOrigin = `${agentData.x}% ${agentData.y}%`;
                    scene.style.transform = `scale(1.8)`;
                }
            } else {
                scene.style.transformOrigin = `50% 50%`;
                scene.style.transform = `scale(1)`;
            }
        }

        function updateAgentUI(agentName, status, message) {
            const id = agentName.toLowerCase();
            const a = agentElements[id];
            if(!a) return;

            const workspaceEl = a.agentEl.parentElement;
            const deskEl = workspaceEl.querySelector('.pa-desk');

            a.agentEl.classList.remove('working', 'state-working', 'state-waiting');
            if (deskEl) deskEl.classList.remove('state-working', 'state-waiting');

            if(status === 'working') {
                const wasWorking = a.status === 'working';
                a.status = 'working';
                a.agentEl.classList.add('working', 'state-working');
                if (deskEl) deskEl.classList.add('state-working');
                document.getElementById(`bubble-${id}`).innerText = '💻';
                if (!wasWorking) { sfx.statusChange('working'); sfx.keyboardBurst(); }
            } else if(status === 'waiting') {
                a.status = 'waiting';
                a.agentEl.classList.add('state-waiting');
                if (deskEl) deskEl.classList.add('state-waiting');
                document.getElementById(`bubble-${id}`).innerText = '⏳';
                sfx.statusChange('waiting');
            } else {
                if (a.status !== 'idle') sfx.statusChange('done');
                a.status = 'idle';
                document.getElementById(`bubble-${id}`).innerText = '💤';
            }

            updateZoom();

            if (message) {
                // Deduplicação: evita mensagem idêntica consecutiva
                const chatContainer = document.getElementById('chat-messages');
                const lastMsg = chatContainer.lastElementChild;
                const msgKey = `${agentName}:${status}:${message}`;
                if (!lastMsg || lastMsg.dataset.msgKey !== msgKey) {
                    const msg = document.createElement('div');
                    msg.className = `chat-msg ${status}`;
                    msg.dataset.msgKey = msgKey;
                    msg.innerHTML = `<span class="chat-msg-name">${agentName}</span>${message}`;
                    chatContainer.appendChild(msg);
                    chatContainer.scrollTo(0, chatContainer.scrollHeight);
                }
                // Typewriter no dialog box
                typeWriter(`${agentName}: "${message}"`);
            }
        }

        socket.on('agent-activity', (data) => {
            console.log('[SOCKET] Evento recebido:', data);
            updateAgentUI(data.agent, data.status, data.message);
        });

        socket.on('state-sync', (state) => {
            console.log('[SOCKET] Sincronização de estado:', state);
            Object.entries(state).forEach(([name, data]) => {
                updateAgentUI(name, data.status, data.message);
            });
        });

        // Polling fallback: caso o socket perca conexão
        let localState = {};
        async function pollState() {
            try {
                const res = await fetch('/state');
                if (!res.ok) return;
                const state = await res.json();
                
                // Compare state with localState for new/updated statuses
                Object.entries(state).forEach(([name, data]) => {
                    const l = localState[name];
                    if (!l || l.status !== data.status || l.message !== data.message) {
                        updateAgentUI(name, data.status, data.message);
                        localState[name] = { ...data };
                    }
                });

                // Reset agents that are no longer in the server state (meaning they are 'done')
                Object.keys(localState).forEach(name => {
                    if (!state[name]) {
                        updateAgentUI(name, 'idle', 'Concluído.');
                        delete localState[name];
                    }
                });
            } catch (e) { console.error('[POLLING] Erro:', e); }
        }
        setInterval(pollState, 3000);

        // --- DAY/NIGHT CYCLE ---
        function checkTimeCycle() {
            const hour = new Date().getHours();
            const scene = document.getElementById('scene');
            // Considera noite das 18:00 às 05:59
            if (hour >= 18 || hour < 6) {
                scene.classList.add('is-night');
            } else {
                scene.classList.remove('is-night');
            }
        }
        setInterval(checkTimeCycle, 2000); // Verifica a cada 2 segundos para resposta rápida
        checkTimeCycle(); // Verifica na inicialização

        sfx.init();
        initScene();
    </script>
</body>
</html>
